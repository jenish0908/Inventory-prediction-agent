version: "3.9"

services:
  app:
    build: .
    container_name: inventory_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/inventory_db
      REDIS_URL: redis://redis:6379/0
      INVENTORY_MCP_URL: http://inventory-mcp:8001
      SUPPLIER_MCP_URL: http://supplier-mcp:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      inventory-mcp:
        condition: service_healthy
      supplier-mcp:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  inventory-mcp:
    build: .
    container_name: inventory_mcp
    command: python -m mcp_servers.inventory_server
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventory_db
      MCP_PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  supplier-mcp:
    build: .
    container_name: supplier_mcp
    command: python -m mcp_servers.supplier_server
    ports:
      - "8002:8002"
    environment:
      MCP_PORT: "8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inventory_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
